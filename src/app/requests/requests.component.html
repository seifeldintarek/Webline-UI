<div class="friends-container">
    <div class="friends">
        <div class="result-item" *ngFor="let friend of friendRequests">
            <img [src]="friend.image" alt="profile" class="avatar" />
            <div class="friend-info">
                <div class="fullName">{{ friend.fullName }}</div>
                <div class="email">{{ friend.email }}</div>
            </div>
            <p-button [label]="accepted ? 'Remove' : 'Accept'" [severity]="accepted ? 'danger' : 'success'"
                [rounded]="true" styleClass="my-btn" (click)="toggleFriend(friend.id!)">
            </p-button>
        </div>
    </div>

    <div class="pagination">
        <button (click)="prevPage()" [disabled]="page === 1">⬅ Prev</button>
        <span>Page {{ page }}</span>
        <button (click)="nextPage()" [disabled]="friendRequests.length < 10">Next ➡</button>
    </div>
</div>
