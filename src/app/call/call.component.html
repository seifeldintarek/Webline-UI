<div class="call-wrapper" #callWrapper (mousedown)="onDragStart($event)" (touchstart)="onTouchStart($event)">

  <!-- Loading state -->
  <div *ngIf="isLoading" class="call-loader">
    <div class="call-loader__ring"></div>
    <p class="call-loader__text">Connecting to call…</p>
  </div>

  <!-- Error state -->
  <div *ngIf="error && !isLoading" class="call-error">
    <div class="call-error__icon">📵</div>
    <p class="call-error__msg">{{ error }}</p>
    <button class="call-error__btn" (click)="leaveCall()">Go Back</button>
  </div>

  <!-- Main call area (hidden during load/error) -->
  <div class="call-inner" [class.hidden]="isLoading || !!error">

    <!-- PRE-CALL PHASE -->
    <div *ngIf="preCallPhase" class="precall-screen">
      <div class="precall-avatar-ring">
        <img [src]="remoteUserAvatar || 'assets/default-avatar.png'" alt="avatar" />
      </div>
      <p class="precall-label">Calling</p>
      <h2 class="precall-name">{{ remoteUserName }}</h2>
      <div class="precall-actions">
        <button class="btn-start" (click)="confirmCall(); $event.stopPropagation()">
          <i class="pi pi-video"></i> Start
        </button>
        <button class="btn-cancel" (click)="cancelCall(); $event.stopPropagation()">
          <i class="pi pi-times"></i> Cancel
        </button>
      </div>
    </div>

    <!-- Zego mounts here -->
    <div id="zego-call-root" [class.hidden]="preCallPhase"></div>

  </div>
</div>
