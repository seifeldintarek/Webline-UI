<div class="search-container">
    <!-- 🔎 Search bar -->
    <input type="text" [(ngModel)]="query" (keyup.enter)="search()" placeholder="Search..." class="search-input" />

    <!-- 👥 Users list -->
    <div class="users">
        <div class="result-item" *ngFor="let user of users">
            <img [src]="user.image" alt="profile" class="avatar" />
            <div class="user-info">
                <div class="fullName">{{ user.fullName }}</div>
                <div class="email">{{ user.email }}</div>
            </div>

            <p-button *ngIf="!isFriend(user) || isPending(user)" (click)="addFriend(user)"
                [label]="isPending(user) ? 'Cancel' : 'Add'" [raised]="true"
                [severity]="isPending(user) ? 'danger' : 'success'" styleClass="custom-btn">
            </p-button>


        </div>
    </div>

    <!-- ⬅➡ Pagination controls -->
    <div class="pagination">
        <button (click)="prevPage()" [disabled]="page === 1">⬅ Prev</button>
        <span>Page {{ page }}</span>
        <button (click)="nextPage()" [disabled]="users.length < 10">Next ➡</button>
    </div>
</div>
