<div class="signup-page">
  <div class="signup-card">

    <div class="signup-header">
      <div class="signup-header__brand">
        <span class="brand-dot"></span>
        <span class="brand-name">Webline</span>
      </div>
      <h1 class="signup-header__title">Create account</h1>
      <p class="signup-header__sub">Join and start connecting</p>
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="signup-form">

      <div class="field-row">
        <div class="field-group">
          <label for="firstName" class="field-label">First Name</label>
          <input type="text" id="firstName" class="field-input" formControlName="firstName" placeholder="Omar" />
        </div>
        <div class="field-group">
          <label for="lastName" class="field-label">Last Name</label>
          <input type="text" id="lastName" class="field-input" formControlName="lastName" placeholder="Marei" />
        </div>
      </div>

      <div class="field-group">
        <label for="email" class="field-label">Email address</label>
        <input type="email" id="email" class="field-input" formControlName="email" placeholder="you@example.com" />
      </div>

      <div class="field-group">
        <label for="mobilePhone" class="field-label">Mobile Phone</label>
        <input type="tel" id="mobilePhone" class="field-input" formControlName="mobilePhone"
          placeholder="+20 100 000 0000" />
      </div>

      <div class="field-group">
        <label for="password" class="field-label">Password</label>
        <input type="password" id="password" class="field-input" formControlName="password"
          placeholder="Min. 10 characters" />
      </div>

      <button type="submit" class="btn-primary">Create account</button>

      <p class="signup-footer">
        Already have an account?
        <a routerLink="/login" class="signup-footer__link">Sign in</a>
      </p>

    </form>
  </div>
</div>
