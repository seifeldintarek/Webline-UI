<div class="login-page">
  <div class="login-card">

    <div class="login-header">
      <div class="login-header__brand">
        <span class="brand-dot"></span>
        <span class="brand-name">Webline</span>
      </div>
      <h1 class="login-header__title">Welcome back</h1>
      <p class="login-header__sub">Sign in to continue</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <div class="field-group">
        <label for="email" class="field-label">Email address</label>
        <input type="email" id="email" class="field-input" formControlName="email" placeholder="you@example.com"
          [class.field-input--error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" />
        <span *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="field-error">
          A valid email is required
        </span>
      </div>

      <div class="field-group">
        <div class="field-label-row">
          <label for="password" class="field-label">Password</label>
          <a href="#" class="field-forgot">Forgot password?</a>
        </div>
        <input type="password" id="password" class="field-input" formControlName="password"
          placeholder="Min. 10 characters"
          [class.field-input--error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" />
        <span *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="field-error">
          Password is required
        </span>
      </div>

      <button type="submit" class="btn-primary">Sign in</button>

      <p class="login-footer">
        Not a member?
        <a href="#" (click)="navigateToSignup($event)" class="login-footer__link">Create an account</a>
      </p>

    </form>
  </div>
</div>
