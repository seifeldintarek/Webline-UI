<div class="home-wrapper">

  <!-- Toggle button — always visible, sits outside the sidebar -->
  <button class="sidebar__toggle" (click)="isSidebarOpen = !isSidebarOpen" title="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="sidebar" [class.collapsed]="!isSidebarOpen">

    <!-- Brand mark -->
    <div class="sidebar__logo">
      <span class="sidebar__logo-dot"></span>
      <span class="sidebar__logo-name">Webline</span>
    </div>

    <!-- Search -->
    <span class="sidebar__label">Discover</span>
    <button routerLink="/home/search" routerLinkActive="active" class="icon-btn">Search</button>

    <!-- Social nav -->
    <span class="sidebar__label">Social</span>
    <button routerLink="/home/friends" routerLinkActive="active">Friends</button>
    <button routerLink="/home/groups" routerLinkActive="active">Groups</button>
    <button routerLink="/home/requests" routerLinkActive="active">Requests</button>

    <!-- Push account + logout to bottom -->
    <div class="sidebar__spacer"></div>
    <div class="sidebar__divider"></div>

    <button routerLink="/home/update-profile" routerLinkActive="active">Account</button>
    <button (click)="logout()">Logout</button>

  </div>

  <div class="content">
    <app-call-notification></app-call-notification>
    <router-outlet></router-outlet>
  </div>

</div>
