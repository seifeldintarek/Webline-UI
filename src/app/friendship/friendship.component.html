<div class="main-container">

  <!-- Friends list -->
  <div class="friends-container">

    <!-- Page header -->
    <div class="friends-header">
      <h2>Friends</h2>
      <p>People you are connected with</p>
      <div class="divider"></div>
    </div>

    <!-- List -->
    <div class="friends">
      <div class="result-item" *ngFor="let friend of friends">
        <img *ngIf="friend.image" [src]="friend.image" alt="profile" class="avatar" />
        <div class="avatar" *ngIf="!friend.image">
          {{ friend.fullName?.charAt(0)?.toUpperCase() }}
        </div>

        <div class="friend-info">
          <div class="fullName">{{ friend.fullName }}</div>
          <div class="email">{{ friend.email }}</div>
        </div>

        <p-button label="Remove" severity="danger" [rounded]="true" styleClass="my-btn"
          (click)="removeFriend(friend.id!)">
        </p-button>

        <p-button icon="pi pi-comment" [rounded]="true" severity="info" (click)="openChat(friend)">
        </p-button>
      </div>

      <!-- Empty state -->
      <div *ngIf="friends.length === 0" class="empty-state">
        <i class="pi pi-users"></i>
        <p>No friends yet</p>
        <small>Search for people to connect with</small>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination-controls">
      <p-button label="← Prev" [rounded]="true" severity="secondary" [disabled]="page === 1" (click)="prevPage()">
      </p-button>
      <span class="page-number">Page {{ page }}</span>
      <p-button label="Next →" [rounded]="true" severity="secondary" (click)="nextPage()">
      </p-button>
    </div>

  </div>

  <!-- Chat panel -->
  <div class="chat-panel">
    <router-outlet></router-outlet>
  </div>

</div>
